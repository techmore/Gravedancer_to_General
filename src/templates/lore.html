{% extends "base.html" %}

{% block title %}{{ page_title }} · {{ site.title }}{% endblock %}
{% block description %}{{ site.title }} — {{ page_title }}{% endblock %}

{% block content %}
<article class="lore-page prose wide-prose">
  <header class="page-header">
    <p class="episode-eyebrow">Lore</p>
    <h1>{{ page.title }}</h1>
  </header>
  {{ page.html | safe }}
</article>
{% endblock %}
